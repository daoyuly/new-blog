<svg xmlns="http://www.w3.org/2000/svg" width="640" height="310" viewBox="0 0 640 310" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
  <defs><filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter></defs>

  <!-- Header -->
  <text x="320" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#555">三条技术路径：从零代码到全代码</text>
  <line x1="80" y1="44" x2="560" y2="44" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Path A -->
  <rect x="30" y="60" width="180" height="230" rx="14" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="2" filter="url(#s)"/>
  <text x="120" y="90" text-anchor="middle" font-size="28">💬</text>
  <text x="120" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#0369a1">路径A</text>
  <text x="120" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#0284c7">零代码</text>
  <line x1="55" y1="148" x2="185" y2="148" stroke="#bae6fd" stroke-width="1"/>
  <text x="120" y="170" text-anchor="middle" font-size="12" fill="#0369a1">Prompt 模板</text>
  <text x="120" y="190" text-anchor="middle" font-size="12" fill="#0369a1">存备忘录/文档</text>
  <text x="120" y="210" text-anchor="middle" font-size="12" fill="#0369a1">手动改参数触发</text>
  <line x1="55" y1="225" x2="185" y2="225" stroke="#bae6fd" stroke-width="1"/>
  <text x="120" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">适合：非技术用户</text>
  <text x="120" y="268" text-anchor="middle" font-size="11" fill="#0c4a6e">起步时间：5分钟</text>

  <!-- Arrow -->
  <text x="222" y="180" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- Path B -->
  <rect x="230" y="60" width="180" height="230" rx="14" fill="#fefce8" stroke="#fde047" stroke-width="2" filter="url(#s)"/>
  <text x="320" y="90" text-anchor="middle" font-size="28">⚡</text>
  <text x="320" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#854d0e">路径B</text>
  <text x="320" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#a16207">低代码</text>
  <line x1="255" y1="148" x2="385" y2="148" stroke="#fef08a" stroke-width="1"/>
  <text x="320" y="170" text-anchor="middle" font-size="12" fill="#854d0e">Agent Skill 框架</text>
  <text x="320" y="190" text-anchor="middle" font-size="12" fill="#854d0e">SKILL.md + 脚本</text>
  <text x="320" y="210" text-anchor="middle" font-size="12" fill="#854d0e">自动触发执行</text>
  <line x1="255" y1="225" x2="385" y2="225" stroke="#fef08a" stroke-width="1"/>
  <text x="320" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">适合：有点折腾精神</text>
  <text x="320" y="268" text-anchor="middle" font-size="11" fill="#713f12">起步时间：1-2小时</text>

  <!-- Arrow -->
  <text x="422" y="180" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- Path C -->
  <rect x="430" y="60" width="180" height="230" rx="14" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2" filter="url(#s)"/>
  <text x="520" y="90" text-anchor="middle" font-size="28">🛠️</text>
  <text x="520" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#9d174d">路径C</text>
  <text x="520" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#be185d">全代码</text>
  <line x1="455" y1="148" x2="585" y2="148" stroke="#fbcfe8" stroke-width="1"/>
  <text x="520" y="170" text-anchor="middle" font-size="12" fill="#9d174d">完整自动化脚本</text>
  <text x="520" y="190" text-anchor="middle" font-size="12" fill="#9d174d">API 拉数据 + LLM</text>
  <text x="520" y="210" text-anchor="middle" font-size="12" fill="#9d174d">自动写入/发送</text>
  <line x1="455" y1="225" x2="585" y2="225" stroke="#fbcfe8" stroke-width="1"/>
  <text x="520" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#831843">适合：程序员</text>
  <text x="520" y="268" text-anchor="middle" font-size="11" fill="#831843">起步时间：半天-1天</text>
</svg>
